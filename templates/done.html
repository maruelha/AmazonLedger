<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Amazon Ledger — Gespeichert</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; margin: 0; padding: 24px; }
    .container { max-width: 600px; margin: 60px auto; }
    .card {
      background: #fff; border-radius: 6px; padding: 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-align: center;
    }
    h1 { font-size: 1.4rem; color: #2d6a2d; margin-top: 0; }
    .counts { margin: 24px 0; }
    .counts table { margin: 0 auto; border-collapse: collapse; font-size: 0.95rem; }
    .counts td { padding: 6px 20px; }
    .counts td:first-child { text-align: right; color: #555; }
    .counts td:last-child { font-weight: 700; text-align: left; }
    .skip-note { color: #c0392b; font-size: 0.9rem; margin-top: 8px; }
    a.btn {
      display: inline-block; margin-top: 20px; background: #e47911;
      color: #fff; text-decoration: none; border-radius: 4px;
      padding: 10px 28px; font-size: 1rem;
    }
    a.btn:hover { background: #c96a0a; }
  </style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>✓ Gespeichert</h1>
    <div class="counts">
      <table>
        <tr><td>Bestellungen gespeichert:</td><td>{{ result.orders }}</td></tr>
        <tr><td>Pakete gespeichert:</td><td>{{ result.packages }}</td></tr>
        <tr><td>Artikel gespeichert:</td><td>{{ result.items }}</td></tr>
      </table>
      {% if skipped > 0 %}
      <p class="skip-note">{{ skipped }} Bestellung(en) übersprungen (bereits vorhanden).</p>
      {% endif %}
    </div>
    <a href="/" class="btn">← Weitere einfügen</a>
    <a href="/manage" class="btn" style="background:#555;margin-left:10px;">Datenbank verwalten</a>
  </div>
</div>
</body>
</html>

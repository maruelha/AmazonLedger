<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Amazon Ledger — Bestellungen einfügen</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; color: #222; margin: 0; padding: 24px; }
    .container { max-width: 860px; margin: 0 auto; }
    h1 { font-size: 1.4rem; border-bottom: 2px solid #e47911; padding-bottom: 8px; }
    textarea {
      width: 100%; height: 320px; font-family: monospace; font-size: 0.85rem;
      border: 1px solid #ccc; border-radius: 4px; padding: 10px; resize: vertical;
    }
    .actions { margin-top: 12px; display: flex; gap: 10px; }
    button {
      background: #e47911; color: #fff; border: none; border-radius: 4px;
      padding: 10px 24px; font-size: 1rem; cursor: pointer;
    }
    button:hover { background: #c96a0a; }
    p.hint { color: #666; font-size: 0.85rem; margin-top: 8px; }
  </style>
</head>
<body>
<div class="container">
  <h1 style="display:flex;justify-content:space-between;align-items:baseline;">
    Amazon Ledger — Bestellungen einfügen
    <span style="display:flex;gap:16px;">
      <a href="/browse" style="font-size:0.8rem;font-weight:normal;color:#e47911;">Bestellungen ansehen →</a>
      <a href="/manage" style="font-size:0.8rem;font-weight:normal;color:#888;">Verwalten</a>
    </span>
  </h1>
  <form method="post" action="/parse">
    <textarea id="paste-area" name="paste" placeholder="Bestelltext von Amazon.de hier einfügen …" autofocus></textarea>
    <div class="actions">
      <button type="submit">Parsen →</button>
    </div>
    <p class="hint">Mehrere Bestellungen auf einmal sind erlaubt. Erst nach dem Klick auf „Speichern" werden Daten in die Datenbank geschrieben.</p>
  </form>
</div>
<script>
function htmlToMarkdown(html) {
  var doc = new DOMParser().parseFromString(html, 'text/html');
  var BLOCK = new Set(['DIV','P','BR','HR','TR','LI','UL','OL',
                       'H1','H2','H3','H4','H5','H6',
                       'SECTION','ARTICLE','HEADER','FOOTER',
                       'TABLE','TBODY','THEAD','TFOOT','MAIN']);
  function walk(node) {
    if (node.nodeType === 3) return node.textContent;
    if (node.nodeType !== 1) return '';
    var tag = node.tagName;
    if (tag === 'A') {
      var href = node.getAttribute('href') || '';
      var text = node.textContent.trim();
      return (text && href) ? '[' + text + '](' + href + ')' : text;
    }
    var inner = Array.from(node.childNodes).map(walk).join('');
    return BLOCK.has(tag) ? '\n' + inner + '\n' : inner;
  }
  var text = walk(doc.body || doc.documentElement);
  return text.replace(/\n{3,}/g, '\n\n').trim();
}

document.getElementById('paste-area').addEventListener('paste', function(e) {
  var html = e.clipboardData.getData('text/html');
  if (!html) return;           // no HTML flavor → allow default plain-text paste
  e.preventDefault();
  var md = htmlToMarkdown(html);
  var ta = e.target;
  var s = ta.selectionStart, end = ta.selectionEnd;
  ta.value = ta.value.substring(0, s) + md + ta.value.substring(end);
  ta.selectionStart = ta.selectionEnd = s + md.length;
});
</script>
</body>
</html>
